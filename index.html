<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Hábitos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#f0ede6;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
textarea{resize:vertical}
h1,h2,.serif{font-family:Georgia,serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ── ANIMATIONS ── */
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.5)}100%{transform:scale(1);opacity:1}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(105,219,124,0.4)}100%{box-shadow:0 0 0 14px rgba(105,219,124,0)}}
@keyframes shimmer{0%,100%{opacity:.7}50%{opacity:1}}

/* ── THEME VARS ── */
:root{
  --bg:#0f1117;--bg2:#161820;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);
  --text:#f0ede6;--sub:#6a6a6a;--muted:#2a2a2a;--soft:#3a3a3a;
  --hover:rgba(255,255,255,0.04);--inp-bg:rgba(255,255,255,0.05);--inp-border:rgba(255,255,255,0.1);
  --accent:#69db7c;--accent2:#4dabf7;
}
body.light{
  background:#f0efe9;color:#1a1a1a;
  --bg:#f0efe9;--bg2:#e8e7e0;--card:rgba(0,0,0,0.04);--border:rgba(0,0,0,0.07);
  --text:#1a1a1a;--sub:#888;--muted:#ddd;--soft:#ccc;
  --hover:rgba(0,0,0,0.03);--inp-bg:rgba(0,0,0,0.04);--inp-border:rgba(0,0,0,0.1);
}
body.light .blob{opacity:.2}
body.light #tooltip{background:#1a1a1a;color:#f0ede6}
body.light .tab.on{background:#1a1a1a;color:#f0ede6}
body.light .modal-overlay{background:rgba(0,0,0,0.5)}
body.light .ejbtn{border-color:rgba(0,0,0,0.1)}
body.light .nbtn{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.09);color:#666}

/* ── LAYOUT ── */
#wrap{max-width:520px;margin:0 auto;padding:32px 16px 120px}
.blob{position:fixed;border-radius:50%;pointer-events:none}

/* top-right action btns */
.top-actions{position:fixed;top:14px;right:14px;z-index:800;display:flex;gap:7px}
.top-btn{width:34px;height:34px;border-radius:50%;background:var(--card);
  border:1px solid var(--border);font-size:15px;display:flex;align-items:center;
  justify-content:center;transition:all .2s;color:var(--sub)}

/* ── COMPONENTS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.inp{width:100%;padding:10px 14px;background:var(--inp-bg);border:1px solid var(--inp-border);
  border-radius:10px;color:var(--text);font-size:14px;outline:none}
.inp::placeholder{color:var(--sub)}

.tabs{display:flex;gap:2px;background:var(--card);border-radius:20px;padding:3px;margin-bottom:22px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:48px;padding:7px 3px;border:none;border-radius:17px;background:transparent;
  color:var(--sub);font-size:10px;transition:all .2s;white-space:nowrap;letter-spacing:.3px}
.tab.on{background:#f0ede6;color:#0f1117;font-weight:600}
body.light .tab.on{background:#1a1a1a;color:#f0ede6}

.nbtn{background:var(--card);border:1px solid var(--border);border-radius:8px;
  color:var(--sub);font-size:17px;width:32px;height:32px;line-height:1;padding:0;flex-shrink:0}

.addbtn{width:100%;padding:13px;background:transparent;border:1px dashed rgba(255,255,255,0.14);
  border-radius:12px;color:var(--sub);font-size:13px;transition:all .2s;letter-spacing:.3px}
@media(hover:hover){.addbtn:hover{border-color:var(--accent);color:var(--accent)}}
.addbtn:active{opacity:.7}

.notebtn{width:100%;padding:13px;background:transparent;border:1px dashed rgba(201,184,232,0.25);
  border-radius:12px;color:var(--sub);font-size:13px;transition:all .2s;margin-bottom:18px}
@media(hover:hover){.notebtn:hover{border-color:#c9b8e8;color:#c9b8e8}}

.pill{padding:4px 11px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--sub);font-size:11px;white-space:nowrap;transition:all .15s}
.pill.on{border-color:var(--accent);background:rgba(105,219,124,0.1);color:var(--accent)}

.modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:900;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{border-radius:20px;padding:24px;max-width:360px;width:100%;
  animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);max-height:90vh;overflow-y:auto;
  background:var(--bg2);border:1px solid var(--border)}

.ejbtn{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);
  background:transparent;font-size:17px;transition:all .15s}
.ejbtn.on{border-color:var(--accent);background:rgba(105,219,124,0.12)}

.colbtn{width:26px;height:26px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:all .15s;flex-shrink:0}
.colbtn.on{border-color:#fff;transform:scale(1.25)}

.drag-handle{cursor:grab;color:var(--soft);font-size:12px;touch-action:none;flex-shrink:0;padding:2px 5px;line-height:1}
.drag-handle:active{cursor:grabbing}
.habit-row{transition:background .12s,opacity .2s;border-radius:10px}
.habit-row.dragging{opacity:.3}
.habit-paused{opacity:.4}

.hcell{width:11px;height:11px;border-radius:2px;flex-shrink:0}

/* today section */
.today-card{background:linear-gradient(135deg,rgba(105,219,124,0.08),rgba(77,171,247,0.05));
  border:1px solid rgba(105,219,124,0.15);border-radius:18px;padding:20px;margin-bottom:20px}

/* streak hero */
.streak-hero{font-family:Georgia,serif;font-size:52px;font-weight:normal;line-height:1;color:var(--text)}

/* motivation phrases */
.motivation{font-family:Georgia,serif;font-style:italic;font-size:14px;color:var(--sub);margin-top:6px}

/* confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confetti-fall 2.5s ease forwards}

/* trophy styles */
.trophy-big{background:linear-gradient(135deg,rgba(255,215,0,0.09),rgba(240,165,0,0.04));
  border:1px solid rgba(255,215,0,0.2);border-radius:16px;padding:16px;margin-bottom:10px;
  position:relative;overflow:hidden;animation:fadeIn .3s ease}
.trophy-small{background:var(--card);border:1px solid var(--border);
  border-radius:11px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:11px}
.trophy-archived{opacity:.35;filter:grayscale(.7)}

.stat-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:16px;font-size:11px;border:1px solid;letter-spacing:.2px}

#tooltip{position:fixed;background:#1a1a22;border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;padding:5px 9px;font-size:11px;color:#f0ede6;pointer-events:none;
  z-index:999;white-space:nowrap;display:none;transform:translate(-50%,-120%)}

/* settings panel */
.settings-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:20px;margin-bottom:20px;animation:fadeIn .2s ease}
.settings-row{display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}

/* all-done celebration bar */
.all-done-bar{background:linear-gradient(90deg,rgba(105,219,124,0.12),rgba(77,171,247,0.08));
  border:1px solid rgba(105,219,124,0.25);border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;gap:12px;margin-bottom:16px;animation:fadeUp .4s ease}
</style>
</head>
<body>

<!-- TOP ACTIONS -->
<div class="top-actions">
  <button class="top-btn" onclick="toggleTheme()" id="theme-btn" title="Tema">🌙</button>
  <button class="top-btn" onclick="toggleSettings()" title="Ajustes">⚙️</button>
</div>

<div class="blob" style="top:-100px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(105,219,124,0.07) 0%,transparent 70%)"></div>
<div class="blob" style="bottom:-80px;right:-60px;width:320px;height:320px;background:radial-gradient(circle,rgba(201,184,232,0.07) 0%,transparent 70%)"></div>
<div id="tooltip"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">

<!-- CONFETTI CONTAINER -->
<div id="confetti-container" style="position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden"></div>

<!-- CELEBRATION -->
<div id="m-cel" class="modal-overlay">
  <div class="modal-box" style="background:linear-gradient(145deg,#1c1a0e,#1a1400)!important;border:1px solid rgba(255,215,0,0.4);text-align:center">
    <div id="cel-icon" style="font-size:60px;margin-bottom:10px;display:inline-block;animation:float 2s ease infinite">🏆</div>
    <div id="cel-label" style="font-size:10px;letter-spacing:4px;color:#ffd700;text-transform:uppercase;margin-bottom:10px">¡Logro desbloqueado!</div>
    <div id="cel-name" style="font-family:Georgia,serif;font-size:21px;margin-bottom:8px;color:#f0ede6"></div>
    <div id="cel-days" style="font-size:13px;color:#a0a0a0;margin-bottom:5px"></div>
    <div id="cel-date" style="font-size:11px;color:#555;margin-bottom:20px"></div>
    <button onclick="closeCel()" style="padding:10px 28px;background:linear-gradient(135deg,#ffd700,#f0a500);border:none;border-radius:20px;color:#0f1117;font-size:14px;font-weight:600">¡Lo logré! 🎊</button>
  </div>
</div>

<!-- POST-ACHIEVE -->
<div id="m-post" class="modal-overlay">
  <div class="modal-box" style="text-align:center">
    <div id="post-ej" style="font-size:26px;margin-bottom:8px"></div>
    <div id="post-nm" style="font-family:Georgia,serif;font-size:17px;margin-bottom:5px;color:var(--text)"></div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:16px">¿Qué querés hacer ahora?</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button onclick="handlePost('continue')" style="padding:11px;background:rgba(105,219,124,0.1);border:1px solid rgba(105,219,124,0.25);border-radius:11px;color:#69db7c;text-align:left;font-size:13px">
        ✅ <strong>Seguir contando días</strong>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">El trofeo queda guardado. Seguís acumulando.</div>
      </button>
      <button onclick="handlePost('reset')" style="padding:11px;background:rgba(249,199,132,0.07);border:1px solid rgba(249,199,132,0.2);border-radius:11px;color:#f9c784;text-align:left;font-size:13px">
        🔄 <strong>Nueva vuelta desde 0</strong>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">El trofeo queda igual.</div>
      </button>
      <button onclick="handlePost('archive')" style="padding:11px;background:rgba(148,163,184,0.06);border:1px solid rgba(148,163,184,0.12);border-radius:11px;color:#94a3b8;text-align:left;font-size:13px">
        📦 <strong>Archivar hábito</strong>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">Lo podés reactivar después.</div>
      </button>
    </div>
  </div>
</div>

<!-- EDIT HABIT -->
<div id="m-edit" class="modal-overlay">
  <div class="modal-box" style="max-width:360px">
    <div style="font-size:15px;margin-bottom:14px;color:var(--text);font-family:Georgia,serif">Editar hábito</div>
    <div style="font-size:11px;color:var(--sub);margin-bottom:5px">Emoji</div>
    <div id="edit-ej-grid" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px"></div>
    <div style="font-size:11px;color:var(--sub);margin-bottom:5px">Color</div>
    <div id="edit-col-grid" style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px"></div>
    <div style="font-size:11px;color:var(--sub);margin-bottom:5px">Nombre</div>
    <input id="edit-name" class="inp" style="margin-bottom:10px">
    <div style="font-size:11px;color:var(--sub);margin-bottom:3px">Meta en días <span style="color:var(--soft)">(opcional)</span></div>
    <input id="edit-goal" type="number" class="inp" placeholder="Sin meta" style="margin-bottom:10px">
    <div style="font-size:11px;color:var(--sub);margin-bottom:3px">Recordatorio <span style="color:var(--soft)">(opcional)</span></div>
    <input id="edit-reminder" type="time" class="inp" style="margin-bottom:14px">
    <div style="font-size:10px;color:#f87171;margin-bottom:14px;padding:8px 12px;background:rgba(248,113,113,0.08);border-radius:8px;border:1px solid rgba(248,113,113,0.15)" id="edit-danger-zone">
      <button onclick="doRemoveHabit()" style="background:none;border:none;color:#f87171;font-size:11px;padding:0;text-decoration:underline;cursor:pointer">🗑️ Eliminar este hábito permanentemente</button>
    </div>
    <div style="display:flex;gap:9px">
      <button onclick="saveEdit()" style="flex:1;padding:10px;background:var(--accent);color:#0f1117;border:none;border-radius:9px;font-size:13px;font-weight:600">Guardar</button>
      <button onclick="closeModal('m-edit')" style="flex:1;padding:10px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:9px;font-size:13px">Cancelar</button>
    </div>
  </div>
</div>

<!-- NAME EDIT -->
<div id="m-name" class="modal-overlay">
  <div class="modal-box" style="max-width:300px;text-align:center">
    <div style="font-family:Georgia,serif;font-size:17px;margin-bottom:5px;color:var(--text)">¿Cómo te llamás?</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:16px">Aparecerá en el encabezado.</div>
    <input id="name-inp" class="inp" placeholder="Tu nombre" style="margin-bottom:14px;text-align:center;font-size:15px">
    <div style="display:flex;gap:9px">
      <button onclick="saveName()" style="flex:1;padding:10px;background:var(--accent);color:#0f1117;border:none;border-radius:9px;font-size:13px;font-weight:600">Guardar</button>
      <button onclick="closeModal('m-name')" style="flex:1;padding:10px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:9px;font-size:13px">Cancelar</button>
    </div>
  </div>
</div>

<div id="wrap"></div>

<script>
'use strict';

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const DAYS   = ['L','M','X','J','V','S','D'];
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const EMOJIS = ['⭐','🌿','🔥','💪','🎯','🌙','☀️','🧠','✍️','🍎','🎸','🧘','📊','💻','🎨','🏆','📚','🏃','💧','🎵'];
const COLORS  = ['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#38d9a9','#4dabf7','#da77f2','#f783ac','#a9e34b','#74c0fc'];
const BIG_TROPHY = 21;

const MOTIVATIONS = [
  'La consistencia supera a la intensidad.',
  'Un día a la vez.',
  'Lo que se mide, mejora.',
  'El progreso, no la perfección.',
  'Cada marca cuenta.',
  'Los hábitos son el interés compuesto de la superación.',
  'No rompas la cadena.',
  'Pequeñas victorias, grandes cambios.',
];

// ── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEF_HABITS = [
  {id:1,name:'Meditar',    emoji:'🧘',color:'#69db7c',completions:{},goal:null,achieved:null,archived:false,trophies:[],reminder:null,paused:false},
  {id:2,name:'Ejercicio',  emoji:'🏃',color:'#ffa94d',completions:{},goal:null,achieved:null,archived:false,trophies:[],reminder:null,paused:false},
  {id:3,name:'Curso Excel',emoji:'📊',color:'#da77f2',completions:{},goal:30,  achieved:null,archived:false,trophies:[],reminder:null,paused:false},
  {id:4,name:'Agua 2L',   emoji:'💧',color:'#4dabf7',completions:{},goal:null,achieved:null,archived:false,trophies:[],reminder:null,paused:false},
];
const DEF_NOTES=[{id:1,date:new Date().toISOString(),title:'Mis objetivos',body:'Borrá esto y escribí los tuyos 🙂'}];

// ── STORAGE ───────────────────────────────────────────────────────────────────
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── STATE ─────────────────────────────────────────────────────────────────────
let habits    = lsGet('hb4_habits',DEF_HABITS).map(h=>({paused:false,reminder:null,trophies:[],...h}));
let notes     = lsGet('hb4_notes', DEF_NOTES);
let settings  = lsGet('hb4_settings',{lightMode:false,userName:'',notifGranted:false,onboardDone:false});
let curTab    = 'habitos';
let weekOff   = 0;
let progMonth = new Date().getMonth();
let calYear   = new Date().getFullYear();
let calHabit  = 'all';
let editingId = null;
let editEmoji = '⭐';
let editColor = COLORS[0];
let pendingCel= null;
let showAdd   = false;
let newEmoji  = '⭐';
let newColor  = COLORS[0];
let showNoteF = false;
let editNoteId= null;
let showSettings=false;
let touchDragIdx=null, touchClone=null;
let motivIdx  = Math.floor(Math.random()*MOTIVATIONS.length);

function persist(){lsSet('hb4_habits',habits);lsSet('hb4_notes',notes);lsSet('hb4_settings',settings);}

// ── KEY FORMAT (zero-padded — critical for string comparison & filtering) ─────
function dkey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function today(){return dkey(new Date());}

function weekDays(off){
  // 7 days ending on today (+ offset weeks), so the last column is always today
  return Array.from({length:7},(_,i)=>{
    const d=new Date();
    d.setDate(d.getDate()-(6-i)+off*7);
    return {key:dkey(d),lbl:DAYS[d.getDay()===0?6:d.getDay()-1],date:d.getDate(),mon:d.getMonth()};
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function streak(c){
  let s=0,d=new Date();
  if(!c[dkey(d)])d.setDate(d.getDate()-1);
  while(c[dkey(d)]){s++;d.setDate(d.getDate()-1);}
  return s;
}
function bestStreakEver(){
  let best=0;
  habits.forEach(h=>{
    const keys=Object.keys(h.completions).filter(k=>h.completions[k]).sort();
    if(!keys.length)return;
    let cur=1,mx=1;
    for(let i=1;i<keys.length;i++){
      const diff=(new Date(keys[i])-new Date(keys[i-1]))/86400000;
      if(diff===1){cur++;mx=Math.max(mx,cur);}else cur=1;
    }
    best=Math.max(best,mx);
  });
  return best;
}
function totalC(c){return Object.values(c).filter(Boolean).length;}
function fmtD(iso){const d=new Date(iso);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function active(){return habits.filter(h=>!h.archived);}
function archivedH(){return habits.filter(h=>h.archived);}
function allTrophies(){return habits.flatMap(h=>h.trophies.map(t=>({...t,name:h.name,emoji:h.emoji,color:h.color,big:t.days>=BIG_TROPHY,hid:h.id})));}

function mStats(year,month){
  const dim=new Date(year,month+1,0).getDate();
  return active().map(h=>{
    let cnt=0;
    for(let d=1;d<=dim;d++){
      if(h.completions[year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')])cnt++;
    }
    return {...h,cnt,pct:Math.round(cnt/dim*100)};
  }).sort((a,b)=>b.cnt-a.cnt);
}

function yearGrid(year){
  const jan1=new Date(year,0,1),dec31=new Date(year,11,31);
  const st=new Date(jan1);
  st.setDate(st.getDate()-(jan1.getDay()===0?6:jan1.getDay()-1));
  const weeks=[],cur=new Date(st);
  while(cur<=dec31){
    const wk=[];
    for(let i=0;i<7;i++){wk.push({d:new Date(cur),key:dkey(cur),inY:cur.getFullYear()===year});cur.setDate(cur.getDate()+1);}
    weeks.push(wk);
  }
  return weeks;
}

function topStreak(){return Math.max(0,...active().map(h=>streak(h.completions)));}

const HC=['rgba(255,255,255,0.04)','rgba(105,219,124,0.2)','rgba(105,219,124,0.45)','rgba(105,219,124,0.72)','#69db7c'];
function heatLvl(dayK){
  const act=active();if(!act.length)return 0;
  const n=calHabit==='all'?act.filter(h=>h.completions[dayK]).length:(habits.find(h=>h.id===calHabit)?.completions[dayK]?act.length:0);
  const f=n/act.length;
  return f===0?0:f<0.34?1:f<0.67?2:f<1?3:4;
}
function heatColor(lvl, habitColor){
  if(!habitColor) return HC[lvl];
  // parse hex to rgba with varying opacity
  const r=parseInt(habitColor.slice(1,3),16);
  const g=parseInt(habitColor.slice(3,5),16);
  const b=parseInt(habitColor.slice(5,7),16);
  const opacities=[0.04,0.25,0.5,0.75,1];
  return lvl===0?'rgba(255,255,255,0.04)':`rgba(${r},${g},${b},${opacities[lvl]})`;
}

function launchConfetti(){

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({habits,notes,v:4,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='habitos-'+new Date().toISOString().slice(0,10)+'.json';
  a.style.display='none';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.habits||!d.notes){alert('Archivo inválido.');return;}
      if(!confirm('¿Reemplazar todos los datos con los del archivo?'))return;
      habits=d.habits.map(h=>({paused:false,reminder:null,trophies:[],...h}));
      notes=d.notes;persist();render();
    }catch{alert('Error al leer el archivo.');}
  };
  r.readAsText(file);ev.target.value='';
}

// ── HABIT ACTIONS ─────────────────────────────────────────────────────────────
function toggleDay(id,dayK){
  const h=habits.find(x=>x.id===id);
  if(!h||h.archived||h.achieved||h.paused)return;
  const nc={...h.completions,[dayK]:!h.completions[dayK]};
  const tot=totalC(nc);
  if(!h.completions[dayK]&&h.goal&&tot>=h.goal){
    const date=new Date().toISOString();
    h.completions=nc;h.achieved=date;
    h.trophies=[...h.trophies,{days:tot,date,archived:false}];
    persist();render();
    setTimeout(()=>openCel({id,name:h.name,emoji:h.emoji,days:tot,date,big:tot>=BIG_TROPHY}),200);
  } else {
    h.completions=nc;persist();
    // check all done today
    const act=active();
    if(act.length>0&&act.every(x=>x.completions[today()])){
      render();setTimeout(()=>launchConfetti(),100);
    } else render();
  }
}

function animateDot(id,dayK){
  toggleDay(id,dayK);
  setTimeout(()=>{
    const btn=document.querySelector('[data-dot="'+id+'-'+dayK+'"]');
    if(btn){btn.style.animation='none';setTimeout(()=>{btn.style.animation='checkPop .3s ease';},10);}
  },20);
}

// ── DRAG ─────────────────────────────────────────────────────────────────────
let dragIdx=null;
function onDragStart(e,idx){dragIdx=idx;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.querySelectorAll('.habit-row')[idx]?.classList.add('dragging'),0);}
function onDragOver(e,idx){
  e.preventDefault();if(dragIdx===null||dragIdx===idx)return;
  const act=active();const mv=act[dragIdx];act.splice(dragIdx,1);act.splice(idx,0,mv);
  habits=[...act,...archivedH()];dragIdx=idx;persist();render();
}
function onDragEnd(){dragIdx=null;document.querySelectorAll('.habit-row').forEach(r=>r.classList.remove('dragging'));}
function onTouchStart(e,idx){
  touchDragIdx=idx;const row=e.currentTarget.closest('.habit-row');const rect=row.getBoundingClientRect();
  touchClone=row.cloneNode(true);
  touchClone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:.7;pointer-events:none;z-index:9999;background:var(--bg2);border-radius:10px;';
  document.body.appendChild(touchClone);row.style.opacity='.2';
}
function onTouchMove(e){
  if(touchDragIdx===null)return;e.preventDefault();
  const t=e.touches[0];
  if(touchClone){touchClone.style.top=(t.clientY-20)+'px';touchClone.style.left=(t.clientX-100)+'px';}
  const el=document.elementFromPoint(t.clientX,t.clientY);const row=el?.closest('.habit-row');
  if(row){const idx=parseInt(row.dataset.idx);if(!isNaN(idx)&&idx!==touchDragIdx){const act=active();const mv=act[touchDragIdx];act.splice(touchDragIdx,1);act.splice(idx,0,mv);habits=[...act,...archivedH()];touchDragIdx=idx;persist();render();if(touchClone)document.body.appendChild(touchClone);document.querySelectorAll('.habit-row')[idx].style.opacity='.2';}}
}
function onTouchEnd(){if(touchClone){touchClone.remove();touchClone=null;}document.querySelectorAll('.habit-row').forEach(r=>r.style.opacity='');touchDragIdx=null;render();}

  const now=new Date(), td=today();
  const act=active(), arch=archivedH(), troph=allTrophies();
  const wd=weekDays(weekOff);
  const done=act.filter(h=>h.completions[td]).length;

  const ts=topStreak();
  const bse=bestStreakEver();
  const activeNonPaused=act.filter(h=>!h.paused);
  const pendingToday=activeNonPaused.filter(h=>!h.completions[td]);

  let H='';

  // ── HEADER ──
  const nm=settings.userName;

  H+=`<div style="margin-bottom:20px;padding-right:80px">

    </div>

  </div>`;

  // ── STREAK HERO (only if streak > 0) ──

    H+=`<div class="today-card" style="margin-bottom:18px;display:flex;align-items:center;gap:18px">
      <div>
        <div class="streak-hero">🔥 ${ts}</div>

  if(showSettings){

    // Habit rows

      // 7 dot cells
      wd.forEach(d=>{

    if(arch.length){

      H+=`</div></details>`;

    // hidden add habit fn
    function addHabit(){}

  // ════════════════════════════════
  //  TAB: PROGRESO (metas + stats fusionados)

  if(curTab==='progreso'){

          <div style="font-size:11px;color:#f9c784;margin-top:2px;font-family:monospace">${stHVal>0?'🔥 '+stHVal+' días':'Sin racha activa'}</div>

        </div>
      </div>`;

        H+=`<div style="font-size:10px;letter-spacing:2px;color:var(--sub);text-transform:uppercase;margin:20px 0 10px">Metas activas</div>`;

            </div>
          </div>`;

    const grid=yearGrid(calYear);

      <span style="font-size:10px;color:var(--sub)">Más</span>

  // ════════════════════════════════
  //  TAB: LOGROS

  if(curTab==='logros'){

            <div style="font-size:16px">${t.big?'🏆':'⭐'}</div>
            <div style="flex:1">
              <div style="font-size:12px;color:var(--text)">${t.emoji} ${esc(t.name)}</div>
              <div style="font-size:10px;color:var(--sub)">${t.days} días · ${fmtD(t.date)}</div>
            </div>
            <button onclick="archiveTrophy(${t.hid},${habits.find(h=>h.id===t.hid)?.trophies.findIndex(x=>x.date===t.date)})"
              style="background:none;border:1px solid var(--border);border-radius:7px;color:var(--sub);font-size:10px;padding:3px 7px">
              Restaurar
            </button>
          </div>`;
        });
        H+=`</div></details>`;
      }
    }

    H+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:18px">
      <div class="card">
        <div style="font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">Mejor racha histórica</div>
        <div style="font-size:24px;color:#f9c784;font-family:Georgia,serif">${bse}<span style="font-size:12px;color:var(--sub)"> días</span></div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">Días consecutivos completados</div>
      </div>
      <div class="card">
        <div style="font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">Total completados</div>
        <div style="font-size:24px;color:var(--text);font-family:Georgia,serif">${habits.reduce((a,h)=>a+totalC(h.completions),0)}<span style="font-size:12px;color:var(--sub)"> ✓</span></div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">Check-ins en toda la historia</div>
      </div>
    </div>`;
  }

  // ════════════════════════════════
  //  TAB: NOTAS
  // ════════════════════════════════
  if(curTab==='notas'){
    if(showNoteF||editNoteId){
      H+=`<div class="card" style="border:1px solid rgba(201,184,232,0.18);margin-bottom:16px">
        <div style="font-size:12px;color:#c9b8e8;margin-bottom:11px;font-family:Georgia,serif">${editNoteId?'✏️ Editando':'📝 Nueva nota'}</div>
        <input id="note-title" class="inp" placeholder="Título" style="margin-bottom:8px;font-size:14px">
        <textarea id="note-body" class="inp" rows="7" placeholder="Escribí tus objetivos, reflexiones, aprendizajes..." style="line-height:1.7;margin-bottom:11px"></textarea>
        <div style="display:flex;gap:9px">
          <button onclick="${editNoteId?'saveEditNote()':'saveNote()'}" style="flex:1;padding:9px;background:#c9b8e8;color:#0f1117;border:none;border-radius:9px;font-size:13px;font-weight:600">${editNoteId?'Guardar cambios':'Guardar'}</button>
          <button onclick="cancelNote()" style="flex:1;padding:9px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:9px;font-size:13px">Cancelar</button>
        </div>
      </div>`;
      if(editNoteId){const en=notes.find(n=>n.id===editNoteId);if(en)setTimeout(()=>{const ti=document.getElementById('note-title');const bo=document.getElementById('note-body');if(ti)ti.value=en.title;if(bo)bo.value=en.body;},0);}
    } else {
      H+=`<button class="notebtn" onclick="showNoteF=true;render()">✍️ Nueva nota</button>`;
    }
    if(!notes.length&&!showNoteF){
      H+=`<div style="text-align:center;padding:40px 20px;color:var(--sub)"><div style="font-size:32px;margin-bottom:10px">📓</div><div>Todavía no hay notas.</div></div>`;
    }
    notes.forEach(n=>{
      H+=`<div class="card" style="border:1px solid rgba(201,184,232,0.1);margin-bottom:9px;background:rgba(201,184,232,0.03)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:13px;margin-bottom:2px;color:var(--text);font-family:Georgia,serif">${esc(n.title)}</div>
            <div style="font-size:10px;color:var(--sub);font-family:monospace">${fmtD(n.date)}</div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button onclick="openEditNote(${n.id})" style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:12px;width:26px;height:26px;display:flex;align-items:center;justify-content:center">✏️</button>
            <button onclick="deleteNote(${n.id})" style="background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.1);border-radius:6px;font-size:12px;width:26px;height:26px;display:flex;align-items:center;justify-content:center">🗑️</button>
          </div>
        </div>
        <div style="font-size:13px;color:#b0a898;line-height:1.7;white-space:pre-wrap">${esc(n.body)}</div>
      </div>`;
    });
  }

  document.getElementById('wrap').innerHTML=H;
}

function resetAll(){
  // Use a two-step inline confirm to avoid file:// protocol blocking confirm()
  const btn=document.querySelector('[onclick="resetAll()"]');
  if(!btn)return;
  if(btn.dataset.step==='1'){
    // Second click — execute
    localStorage.removeItem('hb4_habits');
    localStorage.removeItem('hb4_notes');
    localStorage.removeItem('hb4_settings');
    location.reload();
  } else {
    btn.dataset.step='1';
    btn.textContent='⚠️ Confirmar — se borra todo';
    btn.style.background='rgba(248,113,113,0.2)';
    btn.style.borderColor='rgba(248,113,113,0.5)';
    // Auto-cancel after 5s
    setTimeout(()=>{if(btn.dataset.step==='1'){btn.dataset.step='';btn.textContent='🗑️ Reiniciar';btn.style.background='rgba(248,113,113,0.08)';btn.style.borderColor='rgba(248,113,113,0.25)';}},5000);
  }
}

function doRemoveHabit(){
  const btn=document.querySelector('[onclick="doRemoveHabit()"]');
  if(!btn)return;
  if(btn.dataset.step==='1'){
    habits=habits.filter(h=>h.id!==editingId);
    persist();closeModal('m-edit');render();
  } else {
    btn.dataset.step='1';
    btn.textContent='⚠️ Confirmar eliminación';
    btn.style.color='#ff4444';
    btn.style.fontWeight='600';
    setTimeout(()=>{if(btn.dataset.step==='1'){btn.dataset.step='';btn.textContent='🗑️ Eliminar este hábito permanentemente';btn.style.fontWeight='normal';}},4000);
  }
}

// addHabit needs to be global
function addHabit(){
  const nm=document.getElementById('new-name')?.value.trim();if(!nm)return;
  const g=document.getElementById('new-goal')?.value;
  const r=document.getElementById('new-reminder')?.value;
  habits.push({id:Date.now(),name:nm,emoji:newEmoji,color:newColor,
    completions:{},goal:g?parseInt(g):null,achieved:null,archived:false,
    trophies:[],reminder:r||null,paused:false});
  showAdd=false;persist();render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if(settings.lightMode)document.body.classList.add('light');
document.getElementById('theme-btn').textContent=settings.lightMode?'🌑':'🌙';
scheduleReminders();
render();
</script>
